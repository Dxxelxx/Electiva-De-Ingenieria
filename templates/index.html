<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bebidas del Pacífico</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            margin: 0;
            color: white;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            background: rgba(0,0,0,0.7);
            padding: 30px;
            border-radius: 20px;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
        }

        .bebida {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            margin: 5px 0;
            border-radius: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00c9ff, #92fe9d);
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🥤 Bebidas del Pacífico</h1>

    <form action="/comprar" method="POST">
        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="text" name="telefono" placeholder="Teléfono" required>

        <h3>Selecciona tus bebidas</h3>

        {% for b in bebidas %}
        <div class="bebida">
            <label>
                <input type="checkbox" name="bebidas" value="{{b[0]}}">
                {{b[1]}}
            </label>
            <span>${{b[2]}}</span>
        </div>
        {% endfor %}

        <button type="submit">Comprar</button>
    </form>
</div>

</body>
</html>
