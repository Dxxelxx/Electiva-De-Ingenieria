<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bebidas del Pacífico</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            margin: 0;
            color: white;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            background: rgba(0,0,0,0.7);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            text-align: center;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
        }

        .bebida {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            margin: 8px 0;
            border-radius: 12px;
            transition: 0.3s;
        }

        .bebida:hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.02);
        }

        .info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            object-fit: cover;
        }

        .precio {
            font-weight: bold;
            color: #92fe9d;
        }

        .domicilio {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0, 201, 255, 0.2);
            border-radius: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00c9ff, #92fe9d);
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🥤 Bebidas del Pacífico</h1>

    <form action="/comprar" method="POST">

        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="text" name="telefono" placeholder="Teléfono" required>

        <h3>Selecciona tus bebidas</h3>

        {% for b in bebidas %}
        <div class="bebida">

            <div class="info">
                <!-- 🖼️ IMAGEN -->
                <img src="{{ url_for('static', filename='img/' + b[3]) }}" alt="bebida">

                <label>
                    <input type="checkbox" name="bebidas" value="{{b[0]}}">
                    {{b[1]}}
                </label>
            </div>

            <span class="precio">
                ${{ "{:,}".format(b[2]).replace(",", ".") }}
            </span>
        </div>
        {% endfor %}

        <!-- 🚚 DOMICILIO -->
        <div class="domicilio">
            <label>
                <input type="checkbox" name="domicilio">
                🚚 Domicilio (+$5.000)
            </label>
        </div>

        <button type="submit">Comprar</button>

    </form>
</div>

</body>
</html>
