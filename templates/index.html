<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Brisa y Ron del Pacífico</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:
    linear-gradient(rgba(0,0,0,.8),rgba(0,0,0,.8)),
    url("{{ url_for('static', filename='img/fondo-tienda.jpg.jpeg') }}");
    background-size:cover;
    background-position:center;
    min-height:100vh;
    color:white;
}

.container{
    width:95%;
    max-width:1400px;
    margin:auto;
    padding:30px;
    display:flex;
    gap:30px;
}

/* LEFT */
.left{
    width:25%;
    text-align:center;
}

.left img{
    width:220px;
    margin-bottom:20px;
}

.left h2{
    font-size:42px;
    color:#ffcc70;
}

/* CENTER */
.center{
    flex:1;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(15px);
    border-radius:30px;
    padding:30px;
}

.title h1{
    text-align:center;
    color:#ffcc70;
}

/* INPUTS */
.inputs{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin:20px 0;
}

.inputs input{
    padding:15px;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,.08);
    color:white;
}

/* PRODUCTOS */
.products{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.card{
    background:rgba(255,255,255,.06);
    border-radius:20px;
    padding:15px;
    display:flex;
    gap:15px;
    transition:.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:90px;
    height:90px;
    border-radius:15px;
}

/* BOTON SELECCIONAR */
.select-btn{
    margin-top:10px;
    padding:6px 12px;
    border:none;
    border-radius:10px;
    background:#ffcc70;
    color:black;
    cursor:pointer;
    font-weight:bold;
}

/* CONTADOR */
.counter{
    display:none;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.counter button{
    width:30px;
    height:30px;
    border:none;
    border-radius:8px;
    background:#ffcc70;
    cursor:pointer;
}

.counter span{
    width:20px;
    text-align:center;
}

/* DOMICILIO */
.domicilio{
    margin-top:25px;
    background:rgba(255,255,255,.06);
    padding:15px;
    border-radius:15px;
    font-size:15px;
}

.domicilio input{
    margin-right:10px;
}

/* BOTON */
.btn{
    width:100%;
    margin-top:25px;
    padding:18px;
    border:none;
    border-radius:20px;
    background:linear-gradient(90deg,#ffb347,#ffcc70);
    font-size:22px;
    cursor:pointer;
}

/* RIGHT */
.right{
    width:20%;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.box{
    background:rgba(255,255,255,.05);
    padding:20px;
    border-radius:15px;
}

</style>
</head>

<body>

<form action="/comprar" method="POST">

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <img src="{{ url_for('static', filename='img/logo.png.jpeg') }}">
        <h2>Brisa y Ron<br>del Pacífico</h2>
    </div>

    <!-- CENTER -->
    <div class="center">

        <div class="title">
            <h1>Brisa Y Ron Del Pacifico</h1>
        </div>

        <div class="inputs">
            <input type="text" name="nombre" placeholder="Nombre" required>
            <input type="text" name="telefono" placeholder="Teléfono" required>
        </div>

        <h2>Selecciona tus bebidas 🌴</h2>

        <div class="products">

            {% for b in bebidas %}
            <div class="card">

                <img src="{{ url_for('static', filename='img/' + b[3]) }}">

                <div>

                    <h3>{{ b[1] }}</h3>
                    <p>$ {{ b[2] }}</p>

                    <button type="button" class="select-btn" onclick="seleccionar({{ b[0] }})">
                        Seleccionar
                    </button>

                    <div class="counter" id="counter-{{ b[0] }}">
                        <button type="button" onclick="restar({{ b[0] }})">-</button>
                        <span id="cantidad-{{ b[0] }}">1</span>
                        <button type="button" onclick="sumar({{ b[0] }})">+</button>
                    </div>

                    <input type="hidden" name="cantidad_{{ b[0] }}" id="input-{{ b[0] }}" value="0">

                </div>

            </div>
            {% endfor %}

        </div>

        <!-- ✅ DOMICILIO AGREGADO -->
        <div class="domicilio">
            <label>
                <input type="checkbox" name="domicilio" value="1">
                🚚 ¿Desea servicio a domicilio? (+ $5.000)
            </label>
        </div>

        <button class="btn">🛒 Comprar</button>

    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="box">🌿 Bebidas del Pacífico</div>
        <div class="box">🥥 Ingredientes naturales</div>
        <div class="box">❤️ Apoya lo nuestro</div>
    </div>

</div>

</form>

<script>

function seleccionar(id){
    let counter = document.getElementById("counter-"+id);
    let input = document.getElementById("input-"+id);

    counter.style.display = "flex";
    input.value = 1;

    document.getElementById("cantidad-"+id).innerText = 1;
}

function sumar(id){
    let span = document.getElementById("cantidad-"+id);
    let input = document.getElementById("input-"+id);

    let valor = parseInt(span.innerText);

    if(valor < 10){
        valor++;
    }

    span.innerText = valor;
    input.value = valor;
}

function restar(id){
    let span = document.getElementById("cantidad-"+id);
    let input = document.getElementById("input-"+id);
    let counter = document.getElementById("counter-"+id);

    let valor = parseInt(span.innerText);

    if(valor > 1){
        valor--;
    } else {
        counter.style.display = "none";
        valor = 0;
    }

    span.innerText = valor;
    input.value = valor;
}

</script>

</body>
</html>
