<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Factura</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
    margin: 0;
}

/* CONTENEDOR */
.factura {
    width: 420px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* HEADER */
.header {
    text-align: center;
    border-bottom: 2px dashed #ccc;
    padding-bottom: 10px;
}

.header h2 {
    margin: 0;
}

/* INFO */
.info {
    margin-top: 15px;
    font-size: 14px;
}

.info p {
    margin: 5px 0;
}

/* PRODUCTOS */
.producto {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
}

/* TOTALES */
.totales {
    margin-top: 15px;
    font-size: 15px;
}

.totales p {
    display: flex;
    justify-content: space-between;
}

.total-final {
    font-size: 18px;
    font-weight: bold;
}

/* BOTÓN */
.btn {
    display: block;
    text-align: center;
    margin-top: 20px;
    padding: 12px;
    background: #2c5364;
    color: white;
    text-decoration: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="factura">

    <div class="header">
        <h2>🥤 Bebidas del Pacífico</h2>
        <p>Factura de compra</p>
    </div>

    <div class="info">
        <p><strong>Pedido:</strong> #{{pedido[0]}}</p>
        <p><strong>Cliente:</strong> {{pedido[1]}}</p>
        <p><strong>Teléfono:</strong> {{pedido[2]}}</p>
    </div>

    <h4>Productos:</h4>

    {% for p in productos %}
    <div class="producto">
        <span>{{p[0]}}</span>
        <span>$ {{p[1]}}</span>
    </div>
    {% endfor %}

    <div class="totales">
        <p><span>Subtotal:</span> <span>$ {{pedido[3]}}</span></p>
        <p><span>Domicilio:</span> <span>$ {{pedido[4] and 5000 or 0}}</span></p>
        <p class="total-final">
            <span>Total:</span> <span>$ {{pedido[5]}}</span>
        </p>
    </div>

    <a href="/admin" class="btn">⬅ Volver al panel</a>

</div>

</body>
</html>
