<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recibo</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
        }

        .recibo {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
        }

        .header {
            text-align: center;
            border-bottom: 2px dashed #ccc;
        }

        .producto {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding: 5px 0;
        }

        .total {
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #2c5364;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="recibo">

    <div class="header">
        <h2>🥤 Bebidas del Pacífico</h2>
        <p>Recibo de compra</p>
    </div>

    <p><strong>Cliente:</strong> {{nombre}}</p>
    <p><strong>Teléfono:</strong> {{telefono}}</p>
    <p><strong>Fecha:</strong> {{fecha}}</p>

    <h4>Productos:</h4>

    {% for p in productos %}
    <div class="producto">
        <span>{{p[1]}}</span>
        <span>${{p[2]}}</span>
    </div>
    {% endfor %}

    <div class="total">
        Total: ${{total}}
    </div>

    <a href="/" class="btn">Volver</a>

</div>

</body>
</html>
